services:
    one-team:
      container_name: one-team

      build: .

      ports:
        - '8080:8080'

      volumes:
        - one-team-logs:/one-team/app/run/logs

    db:
      image: 'postgres:latest'

      container_name: postgres

      restart: always

      environment:
        - POSTGRES_PASSWORD=postgres
        - POSTGRES_DB=OneTeamDB

    migrate:
      image: 'migrate/migrate'

      container_name: migrate

      command: ["-path", "/migrations", "-database", "postgresql://postgres:postgres@localhost:5432/OneTeamDB?sslmode=disable", "up", "1"]

      network_mode: container:postgres

      volumes:
          - ./migrations/postgres:/migrations

volumes:
  one-team-logs:
    name: logs
